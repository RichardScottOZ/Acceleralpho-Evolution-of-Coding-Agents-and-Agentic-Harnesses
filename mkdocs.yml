      - "1.2 Claude Code — The Boris Persona": "part1/1.2 Claude Code The Boris Persona.md"
      - "1.3 The UX of Autonomy": "part1/1.3 The UX of Autonomy.md"
    - "Chapter 2: The Ralph Wiggum Loop":
      - "2.1 I'm in Danger Feedback Loops": "part1/2.1 I'm in Danger Feedback Loops.md"
      - "2.2 Recursive Failure": "part1/2.2 Recursive Failure.md"
      - "2.3 The Proverbial Glue": "part1/2.3 The Proverbial Glue.md"
  - "Part II: The Architectural Sovereigns":
