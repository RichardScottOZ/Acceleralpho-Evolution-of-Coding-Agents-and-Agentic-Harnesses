site_name: "Acceleralpho: Evolution of Coding Agents and Agentic Harnesses"
site_description: "A Strossian future history of the Boris era — the definitive guide to coding agents and agentic harnesses."
site_author: "Acceleralpho"
docs_dir: docs
site_dir: book

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - with-pdf:
      author: "Acceleralpho"
      copyright: "Acceleralpho — Evolution of Coding Agents and Agentic Harnesses"
      cover: true
      cover_title: "Acceleralpho"
      cover_subtitle: "Evolution of Coding Agents and Agentic Harnesses"
      output_path: ../book.pdf
      enabled_if_env: ENABLE_PDF_EXPORT

nav:
